<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Link</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="main-canvas"></canvas>

    <div class="interface">
        <aside class="control-panel">
            <header>
                <h1>ORBIT-LINK</h1>
                <div class="system-status">
                    <span class="pulse"></span>
                </div>
            </header>

            <section id="telemetry-output">
                <div class="placeholder-text">
                    <p>WATING FOR UPLINK...</p>
                    <p class="hint">CLICK ON A SATELLITE TO INITIALIZE DECODING</p>
                </div>
            </section>

            
        </aside>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
